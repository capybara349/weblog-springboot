# 应用服务 WEB 访问端口
server:
  port: 8080

# mysql 连接信息
spring:
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mysql://127.0.0.1:3307/weblog?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&zeroDateTimeBehavior=convertToNull
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: Weblog-HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  # 安全框架
  security:
    user:
      name: admin
      password: 123456

#=================================================================
# minio
#=================================================================
minio:
  endpoint: http://127.0.0.1:9000
  accessKey: capybara349
  secretKey: capybara349
  bucketName: weblog
#=================================================================
# Lucene 全文检索
#=================================================================
lucene:
  indexDir: /Users/tonychen/logs/lucene-index